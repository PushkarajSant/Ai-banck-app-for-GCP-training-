services:
  bankapp:
    build: .
    container_name: bankapp
    ports:
      - "8080:8080"
    environment:
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT:-3306}
      - DB_NAME=${DB_NAME:-bankappdb}
      - DB_USER=${DB_USER:-bankuser}
      - DB_PASSWORD=${DB_PASSWORD}
      - OLLAMA_URL=${OLLAMA_URL}
    restart: always
